<div class="page">
  <div class="card">

    <div class="card-header">
      <h1 class="logo">ParkEase</h1>
      <p>Create your account</p>
    </div>

    <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="form">

      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" [(ngModel)]="name" placeholder="Sachin Kumar"/>
      </div>

      <div class="form-group">
        <label>Email *</label>
        <input type="email" [(ngModel)]="email" placeholder="you@example.com"/>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="tel" [(ngModel)]="phone" placeholder="+91 98765 43210"/>
      </div>

      <div class="form-group">
        <label>Password *</label>
        <input type="password" [(ngModel)]="password" placeholder="Min 8 characters"/>
      </div>

      <div class="form-group">
        <label>Register as</label>
        <select [(ngModel)]="role">
          <option value="DRIVER">Driver</option>
          <option value="LOT_MANAGER">Lot Manager</option>
        </select>
      </div>

      <button class="btn-primary" (click)="onRegister()">Create Account</button>

      <p class="bottom-link">
        Already have an account? <a routerLink="/login">Sign In</a>
      </p>
    </div>

  </div>
</div>
