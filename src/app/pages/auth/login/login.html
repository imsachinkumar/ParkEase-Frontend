<div class="page">
  <div class="card">

    <div class="card-header">
      <h1 class="logo">ParkEase</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="you@example.com"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input [type]="showPassword ? 'text' : 'password'"
               [(ngModel)]="password" placeholder="••••••••"/>
        <span class="toggle-pass" (click)="showPassword = !showPassword">
          {{ showPassword ? 'Hide' : 'Show' }}
        </span>
      </div>

      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="rememberMe"/> Remember me
        </label>
        <a routerLink="/forgot-password">Forgot password?</a>
      </div>

      <button class="btn-primary" (click)="onLogin()">Sign In</button>

      <p class="bottom-link">
        Don't have an account? <a routerLink="/register">Register</a>
      </p>
    </div>

  </div>
</div>
